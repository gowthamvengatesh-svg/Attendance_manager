<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Admin Dashboard</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>

📊 Admin Dashboard

<button id="logoutBtn">Logout</button>

</header>

<div class="container">

<div class="card">

<h3>College Analytics</h3>

<p>Total Teachers: <b id="totalTeachers">0</b></p>
<p>Total Students: <b id="totalStudents">0</b></p>
<p>Attendance Percentage: <b id="attendancePercent">0%</b></p>

<canvas id="collegeChart"></canvas>

</div>

<div class="card">

<h3>Teachers</h3>

<div id="teachers"></div>

</div>

<div class="card">

<h3>Attendance by Date</h3>

<input type="date" id="calendarDate">

<button id="viewDateReport">View</button>

<div id="calendarResult"></div>

</div>

<div class="card">

<h3>Database Control</h3>

<button id="resetDatabase">Reset Database</button>

</div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
