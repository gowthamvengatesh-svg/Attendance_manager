<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Teacher Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>


<script type="module" src="app.js"></script>

</head>

<body>

<header class="topbar">

<div class="logo">
📋 Smart Attendance
</div>

<div class="profile-area">

<img id="profilePic" class="avatar">

<div class="profile-text">

<div id="teacherNameDisplay"></div>
<div id="classDisplay"></div>

</div>

<button id="logoutBtn" class="logout-btn">Logout</button>

</div>

</header>

<div class="container">

<div class="card">

<h3>Teacher Information</h3>

<input id="teacherName" placeholder="Teacher Name">
<input id="className" placeholder="Class Name">

<button id="saveProfile">Save</button>

</div>

<div class="card">

<h3>Add Student</h3>

<input id="roll" placeholder="Roll Number">
<input id="name" placeholder="Student Name">

<button id="addStudent">Add Student</button>

</div>

<div class="card">

<h3>Import Excel</h3>

<input type="file" id="excelFile">
<button id="uploadExcel">Upload Excel</button>

</div>

<div class="card">

<button id="presentAll">✔ Present All</button>
<button id="removeAll">🗑 Remove All</button>

</div>

<div class="card">

<h3>Attendance Summary</h3>

<div id="summary"></div>

<canvas id="chart"></canvas>

<input type="date" id="attendanceDate">

<button id="viewHistory">View Attendance</button>

<div id="historyList"></div>

</div>

<div class="card">

<h3>Students</h3>

<div id="studentList"></div>

<button id="saveAttendanceBtn" class="primary-btn">
Save Attendance
</button>

</div>

<div class="card">

<h3>Send Absent List</h3>

<input id="whatsappNumber" placeholder="WhatsApp Number">

<button id="sendWhatsApp">Send</button>

</div>

<div class="card">

<button id="exportExcel">Export Excel</button>

</div>

</div>
<div id="loader" class="loader-wrapper">

<div class="loader"></div>

</div>

<div id="toast" class="toast"></div>
</body>
</html>
